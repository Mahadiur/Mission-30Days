<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Checked</title>
</head>
<body>
    <div class="card">
        <h2>Checked Property</h2>
        <div id="Subscribe">
            <input type="checkbox" id="sub">
            <label for="sub">Subscribe</label>
        </div>
        <div id="options">
            <h4>Payment Method :</h4>
            <input type="radio" name="card" id="Visa">
            <label for="Visa">Visa</label><br>
            <input type="radio" name="card" id="MasterCard">
            <label for="MasterCard">MasterCard</label><br>
            <input type="radio" name="card" id="Paypal">
            <label for="Paypal">Paypal</label><br><br>
        </div>
        <button type="submit" id="btn">Submit</button>
        <hr>
        <p id="resultsub"></p>
        <p id="resultpay"></p>
    </div>
    <script src="./checked.js"></script>
</body>
</html>
