<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Temprature Convertor</title>
    <link rel="stylesheet" href="./style.css">
</head>
<body>
    <div class="container">
        <!-- Heading -->
        <h2 class="heading">Temprature Convertor</h2>
        <!-- User input -->
        <div >
            <input type="number" id="userinput" value="1">
        </div>
        <!-- Options -->
        <div class="checkbox">
            <input class="label" type="radio" name="card" id="celToFahrenhait">
            <label  for="celToFahrenhait">Celsius to Fahrenhait</label><br>
            <input class="label" type="radio" name="card" id="fahToCelsius">
            <label  for="fahToCelsius">Fahrenhait to Celsius</label>
        </div>
        <!-- Submit Button -->
        <button type="submit" id="btn">Submit</button>
        <!-- Result -->
        <p id="result"></p>
    </div>
    <script src="./Program.js"></script>
</body>
</html>
